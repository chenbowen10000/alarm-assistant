<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>? ALARM OPS ? Enterprise Alarm Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0d1117; --bg-panel: #161b22; --bg-card: #1c2333; --border: #30363d;
  --text-primary: #e6edf3; --text-secondary: #8b949e; --text-muted: #484f58;
  --neon-green: #00ff88; --neon-amber: #ff9900; --neon-red: #ff0066; --neon-blue: #58a6ff;
  --font-display: "DM Sans", system-ui, sans-serif; --font-mono: "JetBrains Mono", monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg-deep); color: var(--text-primary);
  font-family: var(--font-display); min-height:100vh; overflow-x:hidden;
}
body::after {
  content:""; position:fixed; top:0; left:0; right:0; bottom:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,136,0.015) 2px,rgba(0,255,136,0.015) 4px);
  pointer-events:none; z-index:9999;
}
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg-deep); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--neon-green); }

.header {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 28px; background:var(--bg-panel); border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:100; backdrop-filter:blur(12px);
}
.header-left { display:flex; align-items:center; gap:12px; }
.logo-icon { font-size:24px; animation:pulse-icon 2s ease-in-out infinite; }
@keyframes pulse-icon {
  0%,100% { text-shadow:0 0 8px var(--neon-green); }
  50% { text-shadow:0 0 20px var(--neon-green),0 0 40px var(--neon-green); }
}
.logo-text { font-family:var(--font-mono); font-size:18px; font-weight:700; color:var(--neon-green); letter-spacing:2px; text-transform:uppercase; }
.status-bar { display:flex; align-items:center; gap:20px; }
.model-status { display:flex; align-items:center; gap:8px; font-family:var(--font-mono); font-size:11px; color:var(--text-secondary); }
.status-dot { width:8px; height:8px; border-radius:50%; position:relative; }
.status-dot.online { background:var(--neon-green); box-shadow:0 0 8px var(--neon-green); animation:breathe 2s ease-in-out infinite; }
.status-dot.standby { background:var(--neon-amber); box-shadow:0 0 4px var(--neon-amber); }
.status-dot.offline { background:var(--neon-red); box-shadow:0 0 4px var(--neon-red); }
@keyframes breathe { 0%,100% { box-shadow:0 0 8px var(--neon-green); } 50% { box-shadow:0 0 16px var(--neon-green),0 0 24px var(--neon-green); } }

.main-container { display:flex; height:calc(100vh - 57px); }
.left-panel { width:40%; min-width:360px; padding:20px; background:var(--bg-panel); border-right:1px solid var(--border); display:flex; flex-direction:column; gap:14px; }
.right-panel { flex:1; padding:24px; overflow-y:auto; background:var(--bg-deep); }

.panel-title { font-family:var(--font-mono); font-size:12px; font-weight:700; color:var(--neon-green); text-transform:uppercase; letter-spacing:2px; }
.panel-title::before { content:"> "; }

.alarm-textarea { width:100%; height:140px; background:var(--bg-card); border:1px solid var(--border); border-radius:6px; color:var(--text-primary); font-family:var(--font-mono); font-size:13px; padding:14px; resize:vertical; caret-color:var(--neon-green); }
.alarm-textarea:focus { outline:none; border-color:var(--neon-green); box-shadow:0 0 0 3px rgba(0,255,136,0.1); }

.btn-row { display:flex; gap:10px; }
.btn { padding:10px 16px; border-radius:6px; font-family:var(--font-mono); font-size:13px; font-weight:700; letter-spacing:2px; cursor:pointer; transition:all 0.3s; text-transform:uppercase; }
.btn-primary { flex:1; background:transparent; border:1px solid var(--neon-green); color:var(--neon-green); }
.btn-primary:hover { background:rgba(0,255,136,0.08); box-shadow:0 0 24px rgba(0,255,136,0.2); }
.btn-secondary { background:transparent; border:1px solid var(--border); color:var(--text-secondary); }
.btn-secondary:hover { border-color:var(--text-primary); color:var(--text-primary); }
.btn.loading { pointer-events:none; border-color:var(--neon-amber) !important; color:var(--neon-amber) !important; }

.quick-examples { display:flex; flex-direction:column; gap:6px; }
.examples-label { font-family:var(--font-mono); font-size:10px; color:var(--text-secondary); text-transform:uppercase; letter-spacing:2px; }
.example-chip { background:var(--bg-card); border:1px solid var(--border); border-radius:4px; padding:8px 12px; color:var(--text-secondary); font-size:12px; font-family:var(--font-mono); cursor:pointer; text-align:left; transition:all 0.2s; }
.example-chip:hover { border-color:var(--neon-blue); color:var(--neon-blue); background:rgba(88,166,255,0.05); }

.history-section { margin-top:auto; border-top:1px solid var(--border); padding-top:12px; max-height:200px; overflow-y:auto; }
.history-item { padding:8px; border:1px solid var(--border); border-radius:4px; margin-bottom:6px; cursor:pointer; font-family:var(--font-mono); font-size:11px; color:var(--text-secondary); transition:all 0.2s; }
.history-item:hover { border-color:var(--neon-blue); background:rgba(88,166,255,0.05); }

/* Progress */
.progress { display:none; margin:16px 0; }
.progress.active { display:block; }
.progress-steps { display:flex; gap:6px; }
.progress-step { flex:1; text-align:center; padding:8px 4px; border-radius:4px; background:rgba(255,255,255,0.02); border:1px solid var(--border); font-family:var(--font-mono); font-size:10px; color:var(--text-muted); transition:all 0.3s; }
.progress-step.done { border-color:var(--neon-green); color:var(--neon-green); background:rgba(0,255,136,0.05); }
.progress-step.running { border-color:var(--neon-amber); color:var(--neon-amber); animation:pulse-border 1s infinite; }
@keyframes pulse-border { 50% { border-color:rgba(255,153,0,0.3); } }
.progress-step .step-label { display:block; font-size:8px; margin-top:2px; color:var(--text-muted); }

/* Report card */
.report-card { display:none; background:var(--bg-card); border:1px solid var(--border); border-radius:8px; padding:24px; animation:slideIn 0.4s ease-out; margin-bottom:20px; }
.report-card.visible { display:block; }
@keyframes slideIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

.risk-badge { display:inline-flex; align-items:center; gap:8px; padding:6px 16px; border-radius:4px; font-family:var(--font-mono); font-size:20px; font-weight:700; margin-bottom:16px; }
.risk-badge.P0 { background:rgba(255,0,102,0.15); color:var(--neon-red); border:1px solid rgba(255,0,102,0.3); animation:breathe-badge 1.5s infinite; }
.risk-badge.P1 { background:rgba(255,153,0,0.15); color:var(--neon-amber); border:1px solid rgba(255,153,0,0.3); animation:breathe-badge 2.5s infinite; }
.risk-badge.P2 { background:rgba(88,166,255,0.15); color:var(--neon-blue); border:1px solid rgba(88,166,255,0.3); }
.risk-badge.P3 { background:rgba(0,255,136,0.1); color:var(--neon-green); border:1px solid rgba(0,255,136,0.2); }
@keyframes breathe-badge { 50% { box-shadow:0 0 12px currentColor; } }

.report-section { margin-bottom:14px; }
.report-label { font-family:var(--font-mono); font-size:10px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:2px; margin-bottom:4px; }
.report-value { font-family:var(--font-mono); font-size:13px; color:var(--text-primary); line-height:1.5; }
.report-divider { border:none; border-top:1px solid var(--border); margin:14px 0; }
.action-list { list-style:none; display:flex; flex-direction:column; gap:6px; }
.action-list li { font-family:var(--font-mono); font-size:12px; padding:8px 12px; background:rgba(0,255,136,0.04); border-left:2px solid var(--neon-green); border-radius:0 4px 4px 0; }
.evidence-list { list-style:none; }
.evidence-list li { font-family:var(--font-mono); font-size:11px; padding:3px 0; color:var(--text-secondary); }
.footer-bar { font-family:var(--font-mono); font-size:11px; color:var(--text-muted); padding-top:12px; border-top:1px solid var(--border); margin-top:16px; display:flex; justify-content:space-between; align-items:center; }

.placeholder-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; min-height:300px; color:var(--text-muted); gap:12px; }
.placeholder-icon { font-size:56px; opacity:0.3; animation:float 3s ease-in-out infinite; }
@keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-8px); } }

@media (max-width:860px) { .main-container { flex-direction:column; } .left-panel { width:100%; min-width:0; } }
</style>
</head>
<body>

<header class="header">
  <div class="header-left"><span class="logo-icon">?</span><span class="logo-text">ALARM OPS</span></div>
  <div class="status-bar">
    <div class="model-status"><span class="status-dot online" id="primaryDot"></span><span id="primaryLabel">DeepSeek</span></div>
    <div class="model-status"><span class="status-dot standby" id="fallbackDot"></span><span id="fallbackLabel">Qwen</span></div>
  </div>
</header>

<div class="main-container">
<div class="left-panel">
  <div class="panel-title">Alarm Input</div>
  <textarea class="alarm-textarea" id="alarmInput" placeholder="> Enter alarm text..."></textarea>
  <div class="btn-row">
    <button class="btn btn-primary" id="analyzeBtn" onclick="runAnalysis()">? Analyze</button>
    <button class="btn btn-secondary" id="streamBtn" onclick="runStreamAnalysis()">?? Stream</button>
  </div>
  <div class="quick-examples">
    <div class="examples-label">Examples</div>
    <button class="example-chip" onclick="setEx(0)">Order service timeout 15%, P99 >5s, v2.3.1 deployed 10min ago</button>
    <button class="example-chip" onclick="setEx(1)">Payment service error rate 8%, DB pool exhausted</button>
    <button class="example-chip" onclick="setEx(2)">Inventory CPU 100% memory 90% query timeout</button>
    <button class="example-chip" onclick="setEx(3)">User service DB connection refused, auth timeout</button>
  </div>
  <div class="history-section" id="historySection">
    <div class="examples-label">History</div>
    <div id="historyList"></div>
  </div>
</div>

<div class="right-panel" id="rightPanel">
  <div class="placeholder-state" id="placeholder"><div class="placeholder-icon">??</div><div style="font-family:var(--font-mono);font-size:13px;">Waiting for alarm input...</div></div>
  <div class="progress" id="progress"><div class="progress-steps">
    <div class="progress-step" id="p-parse"><span>1??</span><span class="step-label">Parse</span></div>
    <div class="progress-step" id="p-tools"><span>2??</span><span class="step-label">Tools</span></div>
    <div class="progress-step" id="p-evidence"><span>3??</span><span class="step-label">Evidence</span></div>
    <div class="progress-step" id="p-rca"><span>4??</span><span class="step-label">RCA</span></div>
    <div class="progress-step" id="p-report"><span>5??</span><span class="step-label">Report</span></div>
  </div></div>
  <div id="reportContainer"></div>
</div>
</div>

<script>
const ex = [
  "Order service timeout rate 15%, P99 >5s, affecting users, v2.3.1 deployed 10min ago",
  "Payment service error rate 8%, DB connection pool exhausted, many failures",
  "Inventory service CPU 100% memory 90%, query timeout",
  "User service DB connection refused, auth timeout"
];
let currentSessionId = null;

function setEx(i) { document.getElementById('alarmInput').value = ex[i]; }

async function runAnalysis() {
  const text = document.getElementById('alarmInput').value.trim();
  if (!text) return;
  const btn = document.getElementById('analyzeBtn');
  btn.classList.add('loading'); btn.textContent = '...';
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('progress').classList.add('active');
  document.getElementById('reportContainer').innerHTML = '';

  const body = { alarmText: text };
  if (currentSessionId) body.sessionId = currentSessionId;

  try {
    const res = await fetch('/api/alarm/analyze', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    const data = await res.json();
    if (!currentSessionId && data.sessionId) currentSessionId = data.sessionId;
    renderReport(data);
    updateStatusBar(data);
    markAllProgressDone();
  } catch(e) {
    document.getElementById('reportContainer').innerHTML = '<div style="color:var(--neon-red);padding:20px">Error: '+e.message+'</div>';
  } finally {
    btn.classList.remove('loading'); btn.textContent = '? Analyze';
  }
}

function runStreamAnalysis() {
  const text = document.getElementById('alarmInput').value.trim();
  if (!text) return;
  const btn = document.getElementById('streamBtn');
  btn.classList.add('loading'); btn.textContent = '...';
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('progress').classList.add('active');
  document.getElementById('reportContainer').innerHTML = '';
  resetProgress();
  markStep('p-parse', 'running');

  const es = new EventSource('/api/alarm/analyze/stream');
  fetch('/api/alarm/analyze/stream', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({alarmText:text}) })
    .then(r => {
      if (!r.ok) throw new Error('Stream failed');
      const reader = r.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      function process() {
        reader.read().then(({done, value}) => {
          if (done) { btn.classList.remove('loading'); btn.textContent = '?? Stream'; return; }
          buffer += decoder.decode(value, {stream:true});
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';
          let eventType = '';

          for (const line of lines) {
            const trimmed = line.trim();
            if (trimmed.startsWith('event:')) { eventType = trimmed.substring(6).trim(); continue; }
            if (trimmed.startsWith('data:')) {
              try {
                const data = JSON.parse(trimmed.substring(5).trim());
                if (eventType === 'step') handleStepEvent(data);
                else if (eventType === 'report') { renderReport(data); updateStatusBar(data); markAllProgressDone(); }
                else if (eventType === 'done') { btn.classList.remove('loading'); btn.textContent = '?? Stream'; }
              } catch(e) {}
            }
          }
          process();
        });
      }
      process();
    }).catch(e => {
      btn.classList.remove('loading'); btn.textContent = '?? Stream';
      document.getElementById('reportContainer').innerHTML += '<div style="color:var(--neon-red)">Stream error: '+e.message+'</div>';
    });
}

function handleStepEvent(data) {
  const stepMap = { parse:'p-parse', tools:'p-tools', evidence:'p-evidence', rca:'p-rca', report:'p-report' };
  const id = stepMap[data.step];
  if (id) {
    if (data.status === 'done') markStep(id, 'done');
    else if (data.status === 'running') markStep(id, 'running');
  }
}

function markStep(id, status) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = 'progress-step ' + status;
}

function resetProgress() {
  ['p-parse','p-tools','p-evidence','p-rca','p-report'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.className = 'progress-step';
  });
}

function markAllProgressDone() {
  ['p-parse','p-tools','p-evidence','p-rca','p-report'].forEach(id => markStep(id, 'done'));
}

function updateStatusBar(data) {
  const m = data.modelUsed || '';
  const fb = data.fallbackActivated;
  const totalMs = data.pipelineLatency ? data.pipelineLatency.total : 0;
  const totalS = (totalMs / 1000).toFixed(1);
  if (fb) {
    document.getElementById('primaryDot').className = 'status-dot offline';
    document.getElementById('primaryLabel').textContent = 'DeepSeek FAILED';
    document.getElementById('fallbackDot').className = 'status-dot online';
    document.getElementById('fallbackLabel').textContent = 'Qwen ACTIVE ('+totalS+'s)';
  } else {
    document.getElementById('primaryDot').className = 'status-dot online';
    document.getElementById('primaryLabel').textContent = 'DeepSeek ('+totalS+'s)';
    document.getElementById('fallbackDot').className = 'status-dot standby';
    document.getElementById('fallbackLabel').textContent = 'Qwen STANDBY';
  }
}

function renderReport(data) {
  const r = data.report || data;
  const totalMs = data.pipelineLatency ? data.pipelineLatency.total : 0;
  const analysisId = data.analysisId || '';

  let metricsHtml = '';
  if (r.keyMetrics && Object.keys(r.keyMetrics).length > 0) {
    metricsHtml = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-top:4px">';
    for (const [k,v] of Object.entries(r.keyMetrics)) {
      metricsHtml += '<div style="background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:4px;padding:8px 10px"><div style="font-size:10px;color:var(--text-muted)">'+k+'</div><div style="font-size:14px;font-weight:700;color:var(--neon-green);margin-top:2px">'+v+'</div></div>';
    }
    metricsHtml += '</div>';
  }

  let actionsHtml = '';
  if (r.recommendedActions) {
    actionsHtml = '<ul class="action-list">';
    r.recommendedActions.forEach(a => actionsHtml += '<li>'+a+'</li>');
    actionsHtml += '</ul>';
  }

  let evidenceHtml = '';
  if (r.evidence) {
    evidenceHtml = '<ul class="evidence-list">';
    r.evidence.forEach(e => evidenceHtml += '<li>'+e+'</li>');
    evidenceHtml += '</ul>';
  }

  let mdBtn = '';
  if (analysisId) {
    mdBtn = '<button class="btn btn-secondary" style="padding:6px 12px;font-size:11px" onclick="downloadMd(\''+analysisId+'\')">?? MD</button>';
  }

  const card = document.createElement('div');
  card.className = 'report-card visible';
  card.innerHTML = [
    '<span class="risk-badge '+(r.riskLevel||'P2')+'">? '+(r.riskLevel||'?')+' ? '+(r.severity||'?')+'</span>',
    '<div class="report-section"><div class="report-label">Service</div><div class="report-value" style="color:var(--neon-green);font-size:16px;font-weight:700">'+(r.serviceName||'?')+'</div></div>',
    '<div class="report-section"><div class="report-label">Alarm Type</div><div class="report-value">'+(r.alarmType||'?')+'</div></div>',
    metricsHtml ? '<div class="report-section"><div class="report-label">Key Metrics</div>'+metricsHtml+'</div>' : '',
    '<hr class="report-divider">',
    '<div class="report-section"><div class="report-label">Root Cause</div><div class="report-value">'+(r.possibleRootCause||'Pending')+'</div></div>',
    '<div class="report-section"><div class="report-label">Confidence</div><div class="report-value">'+((r.confidence||0)*100).toFixed(0)+'%</div></div>',
    '<hr class="report-divider">',
    actionsHtml ? '<div class="report-section"><div class="report-label">Recommended Actions</div>'+actionsHtml+'</div>' : '',
    '<div class="report-section"><div class="report-label">Rollback</div><div class="report-value" style="color:'+(r.shouldRollback?'var(--neon-red)':'var(--text-secondary)')+'">'+(r.shouldRollback?'? Recommended':'Not needed')+'</div></div>',
    '<div class="report-section"><div class="report-label">Escalation</div><div class="report-value">'+(r.needsEscalation?'? Escalate to human':'Not needed')+'</div></div>',
    evidenceHtml ? '<hr class="report-divider"><div class="report-section"><div class="report-label">Tool Evidence</div>'+evidenceHtml+'</div>' : '',
    '<div class="footer-bar"><span>Model: '+(data.modelUsed||'?')+(data.fallbackActivated?' (fallback)':'')+'</span><span>'+mdBtn+' Total: '+(totalMs/1000).toFixed(1)+'s</span></div>'
  ].join('\n');

  document.getElementById('reportContainer').insertBefore(card, document.getElementById('reportContainer').firstChild);

  // Add to history
  if (currentSessionId && analysisId) {
    addHistoryEntry(currentSessionId, r.serviceName||'?', r.riskLevel||'?');
  }
}

function downloadMd(analysisId) {
  window.open('/api/alarm/report/'+analysisId+'/markdown', '_blank');
}

function addHistoryEntry(sessionId, service, risk) {
  const list = document.getElementById('historyList');
  const existing = list.querySelector('[data-sid="'+sessionId+'"]');
  if (existing) existing.remove();
  const div = document.createElement('div');
  div.className = 'history-item';
  div.setAttribute('data-sid', sessionId);
  div.innerHTML = '<span style="color:var(--neon-green)">?</span> '+service+' <span style="font-size:9px;opacity:0.6">'+risk+'</span>';
  div.onclick = () => document.getElementById('alarmInput').value = '';
  list.insertBefore(div, list.firstChild);
}

document.getElementById('alarmInput').focus();
document.getElementById('alarmInput').addEventListener('keydown', e => { if (e.key==='Enter' && e.ctrlKey) runAnalysis(); });
</script>
</body>
</html>
